<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Account Configuration</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

 <link rel="stylesheet" href="css/AccountCss.css">
<script src="js/AccountScript.js"></script> 

</head>
<body>

<div class="container">
    <header>
    <h2>Account Congifuration Setting</h2>
    <p class="subtitle">Manage your profile, credentials, and preferences.</p>
  </header>

<div class="form-row">
<div class="input-group full-width">

    <label>Enter the Login ID:</label>
    <input type="text" id="loginid"><br><br>

    <label>Shipping API License Key:</label>
    <input type="text" id="skey"><br><br>


    <label>Tracking API License Key:</label>
    <input type="text" id="tkey"><br><br>


    <label>Customer Code Area:</label>
    <input type="text" id="area"><br><br>


    <label>Customer Code:</label>
    <input type="text" id="code"><br><br>


    <label>Pickup Address:</label>
    <input type="text" id="cname" placeholder="Company Name">
    <input type="text" id="cadr1" placeholder="Address Line 1">
    <input type="text" id="cadr2" placeholder="Address Line 2">
    <input type="text" id="cadr3" placeholder="Address Line 3">

    <label>Pincode:</label>
    <input type="text" id="cpin"><br><br>


    <label>Phone No:</label>
    <input type="text" id="phone"><br><br>

 <label>Shipper GST No</label>
    <input type="text" id="gstno"><br><br>


    <label>Enable Auto Reference: </label>
<select name="autoRef" id="autoRef">
	<option value='yesAuto'>Yes</option>
        <option value='noAuto' selected>No</option>
</select><br><br>
</div>
</div>


    
<div class="mps-container">
<label>MPS Setting:</label>    
<div class="input-row">
        <div class="field-group">
            <span> Origin Area:</span>
            <input type="text" id="oarea" placeholder="MAA/STR" style="text-transform: uppercase;">
        </div>

        <div class="field-group">
            <span> Margin Left:</span>
            <input type="number" id="lalign" placeholder="0" onblur="if(this.value==='') this.value='0';" onfocus="if(this.value==='0') this.value='';">
        </div>

        <div class="field-group">
            <span> Margin Top:</span>
            <input type="number" id="talign" placeholder="0" onblur="if(this.value==='') this.value='0';" onfocus="if(this.value==='0') this.value='';">
        </div>
    </div>
</div>



    <button onclick="saveConfig()">Save</button>
</div>



</body>
</html>
